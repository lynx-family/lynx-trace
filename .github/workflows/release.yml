name: Publish Trace Analysis Packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - alpha
      packages:
        description: 'Select packages to release'
        required: true
        type: choice
        options:
          - all
          - '@lynx-js/trace-analysis-agent'
          - '@lynx-js/trace-query'
          - '@lynx-js/skill-lynx-trace-analysis'
          - '@lynx-js/skill-lynx-trace-record'
        default: all

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: ./trace_analysis
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Upgrade npm CLI to latest
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build packages
        run: pnpm build

      - name: Create changeset
        run: |
          ALL_PACKAGES=(
            "@lynx-js/trace-analysis-agent"
            "@lynx-js/trace-query"
            "@lynx-js/skill-lynx-trace-analysis"
            "@lynx-js/skill-lynx-trace-record"
          )
          
          if [ "${{ github.event.inputs.packages }}" = "all" ]; then
            SELECTED_PACKAGES=("${ALL_PACKAGES[@]}")
          else
            SELECTED_PACKAGES=("${{ github.event.inputs.packages }}")
          fi
          
          CHANGESET_CONTENT="---\n"
          for pkg in "${SELECTED_PACKAGES[@]}"; do
            CHANGESET_CONTENT="$CHANGESET_CONTENT  \"$pkg\": patch\n"
          done
          CHANGESET_CONTENT="$CHANGESET_CONTENT---\n\nRelease packages"
          
          echo -e "$CHANGESET_CONTENT" > .changeset/release-packages.md

      - name: Version and publish patch version
        if: ${{ github.event.inputs.release_type == 'patch' }}
        run: |
          pnpm changeset:version
          git add -A
          git commit -m "chore: release trace analysis packages"

      - name: Push changes
        if: ${{ github.event.inputs.release_type == 'patch' }}
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "patch" ]; then
            pnpm changeset:publish
          else
            pnpm changeset:alpha
          fi
